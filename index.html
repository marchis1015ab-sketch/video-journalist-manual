<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JTBC WATCHDOGS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1 class="logo">JTBC WATCHDOGS</h1>

      <div class="menu">
        <div class="menu-item" data-menu="team">팀기록</div>
        <div class="submenu" data-submenu="team">
          <div data-year="2022">2022</div>
          <div data-year="2023">2023</div>
          <div data-year="2024">2024</div>
          <div data-year="2025">2025</div>
          <div data-year="2026">2026</div>
        </div>

        <div class="menu-item" data-menu="player">선수기록</div>
        <div class="submenu" data-submenu="player">
          <div data-year="2022">2022</div>
          <div data-year="2023">2023</div>
          <div data-year="2024">2024</div>
          <div data-year="2025">2025</div>
          <div data-year="2026">2026</div>
        </div>

        <div class="menu-item" data-menu="total">통산기록</div>

        <div class="menu-item" data-menu="rank">통산순위</div>
        <div class="submenu" data-submenu="rank">
          <div data-type="hitter">타자</div>
          <div data-type="pitcher">투수</div>
        </div>
      </div>
    </aside>

    <main class="content">
      <div id="page-container"></div>
    </main>
  </div>

  <script id="player-stats-template" type="text/template">
    <div class="page">
      <div class="page-header">
        <h2 id="player-stats-title">선수기록 2022</h2>
        <p id="player-stats-subtitle">2022년 타자 기록</p>
      </div>

      <div class="player-type-tabs">
        <button class="player-type-tab" data-player-type="hitter" type="button">타자</button>
        <button class="player-type-tab" data-player-type="pitcher" type="button">투수</button>
      </div>

      <div class="table-wrap">
        <table class="stats-table">
          <thead>
            <tr>
              <th>이름</th>
              <th>등번호</th>
              <th>포지션</th>
              <th>게임수</th>
              <th>타석</th>
              <th>타수</th>
              <th>총안타</th>
              <th>안타</th>
              <th>2루타</th>
              <th>3루타</th>
              <th>홈런</th>
              <th>루타</th>
              <th>타점</th>
              <th>득점</th>
              <th>도루</th>
              <th>도루실패</th>
              <th>희생타</th>
              <th>희생플라이</th>
              <th>볼넷</th>
              <th>사구</th>
              <th>사사구</th>
              <th>삼진</th>
              <th>병살</th>
              <th>AVG</th>
              <th>출루율OBP</th>
              <th>장타율SLG</th>
              <th>OPS</th>
            </tr>
          </thead>
          <tbody id="player-stats-body"></tbody>
        </table>
      </div>
    </div>
  </script>

  <script src="formulas.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
